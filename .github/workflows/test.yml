name: Test Suite

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1,4'

permissions:
  contents: read

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test (short)
        run: go test ./... -short -count=1 -race -coverprofile=coverage.out

      - name: Coverage report
        run: go tool cover -func=coverage.out
