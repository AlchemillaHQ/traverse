version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
      - openbsd
      - netbsd
    goarch:
      - amd64
      - arm64
      - '386'
      - arm
      - ppc64le
      - s390x
      - mips64le
      - riscv64
    goarm:
      - '6'
      - '7'
    ldflags:
      - -s -w
      - -X github.com/AlchemillaHQ/traverse/internal/version.Version={{ .Version }}
      - -X github.com/AlchemillaHQ/traverse/internal/version.Commit={{ .Commit }}
      - -X github.com/AlchemillaHQ/traverse/internal/version.BuildDate={{ .Date }}
    main: .
    ignore:
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: ppc64le
      - goos: freebsd
        goarch: s390x
      - goos: freebsd
        goarch: mips64le
      - goos: freebsd
        goarch: riscv64
      - goos: openbsd
        goarch: '386'
      - goos: openbsd
        goarch: arm
      - goos: openbsd
        goarch: ppc64le
      - goos: openbsd
        goarch: s390x
      - goos: openbsd
        goarch: mips64le
      - goos: openbsd
        goarch: riscv64
      - goos: netbsd
        goarch: arm
      - goos: netbsd
        goarch: ppc64le
      - goos: netbsd
        goarch: s390x
      - goos: netbsd
        goarch: mips64le
      - goos: netbsd
        goarch: riscv64
      - goos: darwin
        goarch: '386'
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: ppc64le
      - goos: darwin
        goarch: s390x
      - goos: darwin
        goarch: mips64le
      - goos: darwin
        goarch: riscv64
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: ppc64le
      - goos: windows
        goarch: s390x
      - goos: windows
        goarch: mips64le
      - goos: windows
        goarch: riscv64

archives:
  - formats: ['tar.gz']
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}{{ if .Mips }}_{{ .Mips }}{{ end }}'
    format_overrides:
      - goos: windows
        formats: ['zip']

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ .Tag }}-next'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^ci:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: AlchemillaHQ
    name: traverse
